<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Inicial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./css/form.css">
    <script src="./js/eval_2.js"></script>
</head>

<body>
    <div class="container">
        <div class="row">
            <p class="h1">Formulario de Registro</p>
        </div>
        <div class="row formulario_principal">
            <div class="col-3"></div>
            <div class="col-9">
                <p>Los campos marcados con asterisco (*) son obligatorios.</p>
                <form action="" method="post">
                    <label for="fname" class="form-label">* Nombre:</label><br>
                    <input class="form-control" type="text" id="fname" name="fname" required placeholder="Ingrese su nombre"><br>
                    
                    <label for="lname" class="form-label">* Apellido:</label><br>
                    <input class="form-control" type="text" id="lname" name="lname" required placeholder="Ingrese su apellido"><br>
                    
                    <label for="rut" class="form-label">* Rut:</label><br>
                    <input class="form-control" type="text" id="rut" name="rut" required placeholder="Ingrese su rut" minlength="9" maxlength="12"><br>
                    
                    <label for="fecha_nac" class="form-label">Fecha Nacimiento:</label><br>
                    <input type="date" id="fecha_nac" name="fecha_nac"><br>
                    
                    <label for="email" class="form-label">Email:</label><br>
                    <input class="form-control" type="email" id="email" name="email" placeholder="Ingrese su email" required><br>
                    
                    <label for="experiencia">Años de Estudio:</label><br>
                    <input type="range" id="experiencia" name="experiencia" min="0" max="10"
                        oninput="this.nextElementSibling.value = this.value"><output></output><br>
                    <div class="salto_linea"></div>

                    <p>Género</p>
                    <input type="radio" id="html" name="genero" value="mujer">
                    <label for="html">Mujer</label><br>
                    <input type="radio" id="css" name="genero" value="hombre">
                    <label for="css">Hombre</label><br>
                    <input type="radio" id="javascript" name="genero" value="N/A">
                    <label for="javascript">Prefiero NO decir</label>

                    <div class="salto_linea"></div>
                    <input type="button" onclick="cambiar_fondo();" class="btn btn-secondary" value="Cambiar Color">
                    <input type="button" class="btn btn-secondary" value="Cancelar">
                    <input type="submit" onclick="" class="btn btn-primary" value="Aceptar">
                </form>
            </div>
        </div>
        <div class="row">
            <div class="col">col 1</div>
            <div class="col">col 2</div>
            <div class="col">col 3</div>
        </div>
    </div>
</body>

</html>
