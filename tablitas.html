    <body>
        <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
            <div class="container-fluid">
                <div class="collapse navbar-collapse" id="navbarColor02">
                    <ul class="navbar-nav me-auto">

        <div class="container">
            <div class="row">
                <div class="col-4">
                    <select name="datos" id="selectDatos" class="form-select" onchange="seleccionarData()">
                        <option value="1" selected>Usuarios</option>
                        <option value="2" selected>Publicaciones</option>
                        <option value="3" selected>Comentarios</option>
                        <option value="4" selected>Tareas</option>
                    </select>
                </div>
            </div>

            <div class="row" id="divTablaUsuarios">
                <table id="tablaUsuarios" class="display">
                    <thead>
                        <th>N°</th>
                        <th>Nombre</th>
                        <th>Usuario</th>
                        <th>Email</th>
                        <th>Teléfono</th>
                        <th>Página Web</th>
                    </thead>
                    <tfoot>
                        <th>N°</th>
                        <th>Nombre</th>
                        <th>Usuario</th>
                        <th>Email</th>
                        <th>Teléfono</th>
                        <th>Página Web</th>
                    </tfoot>
                </table>
            </div>

            <div class="row" id="divTablaPublicaciones">
                <table id="tablaPublicaciones" class="display">
                    <thead>
                        <th>N°</th>
                        <th>Usuario</th>
                        <th>Título</th>
                        <th>Contenido</th>
                    </thead>
                    <tfoot>
                        <th>N°</th>
                        <th>Usuario</th>
                        <th>Título</th>
                        <th>Contenido</th>
                    </tfoot>
                </table>
            </div>

            <div class="row" id="divTablaComentarios">
                <table id="tablaComentarios" class="display"></table>
            </div>

            <div class="row" id="divTablaTareas">
                <table id="tablaTareas" class="display"></table>
            </div>
        </div>

    </body>
